<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SuperAdmin - Panel General</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { padding: 40px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin: 0;
      font-size: 16px;
      color: #555;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
      color: #7A1E2C;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #7A1E2C;
      color: white;
    }

    .search-box {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
    }

  </style>
</head>
<body>

<div class="top-bar">
  <h1>Panel General de Planteles</h1>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="cards" id="plantelesCards"></div>

<div class="search-box">
  <input type="text" id="buscarCurp" placeholder="Buscar alumno por CURP">
  <button onclick="buscarAlumno()">Buscar</button>
  <button onclick="exportarExcel()">Exportar Excel General</button>
</div>

<table>
  <thead>
    <tr>
      <th>Plantel</th>
      <th>Nombre</th>
      <th>CURP</th>
      <th>Folio</th>
    </tr>
  </thead>
  <tbody id="tablaAlumnos"></tbody>
</table>

<script>
if(!localStorage.getItem("superadmin_token")){
  window.location.href = "/superadmin-login.html";
}

function logout(){
  localStorage.removeItem("superadmin_token");
  window.location.href = "/superadmin-login.html";
}

async function cargarResumen(){
  const res = await fetch("/api/superadmin/resumen", {
    headers: { Authorization: "Bearer " + localStorage.getItem("superadmin_token") }
  });

  const data = await res.json();
  const container = document.getElementById("plantelesCards");
  container.innerHTML = "";

  for(const plantel in data){
    container.innerHTML += `
      <div class="card">
        <h3>${plantel}</h3>
        <p>${data[plantel]}</p>
      </div>
    `;
  }
}

async function buscarAlumno(){
  const curp = document.getElementById("buscarCurp").value.trim();

  const res = await fetch(`/api/superadmin/buscar/${curp}`, {
    headers: { Authorization: "Bearer " + localStorage.getItem("superadmin_token") }
  });

  const data = await res.json();
  const tbody = document.getElementById("tablaAlumnos");
  tbody.innerHTML = "";

  data.forEach(alumno => {
    tbody.innerHTML += `
      <tr>
        <td>${alumno.plantel}</td>
        <td>${alumno.nombres} ${alumno.primer_apellido}</td>
        <td>${alumno.curp}</td>
        <td>${alumno.folio}</td>
      </tr>
    `;
  });
}

function exportarExcel(){
  window.open("/api/superadmin/exportar", "_blank");
}

cargarResumen();
</script>

</body>
</html>
