<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <title>Panel Estatal de Planteles</title>
  <link rel="stylesheet" href="/superadmin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="header">
  <h1>SISTEMA ESTATAL DE REGISTRO</h1>
  <p>Control Centralizado de Planteles</p>
  <button id="logoutBtn">Cerrar Sesión</button>
  <a href="index.html">Inicio</a>
  
</header>

<section class="cards">

  <div class="card">
    <h3>Total General</h3>
    <p id="totalGeneral">0</p>
  </div>

  <div class="card">
    <h3>Plantel con Más Registros</h3>
    <p id="liderPlantel">-</p>
  </div>

  <div class="card">
    <h3>Estado del Sistema</h3>
    <label class="switch">
      <input type="checkbox" id="bloqueoSwitch">
      <span class="slider"></span>
    </label>
    <p id="estadoTexto">Abierto</p>
  </div>

</section>

<section class="grafica">
  <canvas id="graficaPlanteles"></canvas>
</section>

<section class="tabla-section">
  <h2>Detalle por Plantel</h2>
  <table id="tablaPlanteles">
    <thead>
      <tr>
        <th>Plantel</th>
        <th>Total Registros</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<script src="/superadmin.js"></script>

</body>
</html>
