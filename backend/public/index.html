<h2>Consulta tu folio o número de control</h2>
<form id="busquedaRegistroForm">
  <input
    type="text"
    id="identificadorBusqueda"
    placeholder="Ingresa tu folio o número de control"
    required
  />
  <button type="submit">Buscar</button>
</form>



  <form id="reimprimirForm">
  <input type="text" id="folioReimpresion" placeholder="Ingresa tu folio o número de control para reimprimir" required />
  <button type="submit">Reimprimir PDF</button>
</form>

<div id="alerta-servidor" style="display:none; background-color:#ffcdd2; color:#b71c1c; padding:10px; text-align:center; font-weight:bold;">
  ⚠️ El servidor está experimentando una alta demanda. Si no carga correctamente, intenta más tarde.
</div>
<script>
document.getElementById("reimprimirForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const folio = document.getElementById("folioReimpresion").value.trim();

  if (!folio) {
    alert("Ingresa un folio o número de control válido");
    return;
  }

  // 🔥 Abrir directamente el endpoint que genera el PDF
  window.open(`/api/reimprimir/${encodeURIComponent(folio)}`, "_blank");
});
</script>

<script>
  async function verificarServidor() {
    try {
      const respuesta = await fetch('/api/ping');
      if (!respuesta.ok) throw new Error('Error en la respuesta');
    } catch (error) {
      document.getElementById('alerta-servidor').style.display = 'block';
    }
  }

  verificarServidor();
</script>


<script>
const busquedaRegistroForm = document.getElementById("busquedaRegistroForm");
const identificadorBusqueda = document.getElementById("identificadorBusqueda");

identificadorBusqueda.addEventListener("input", () => {
  identificadorBusqueda.value = identificadorBusqueda.value.toUpperCase();
});

async function buscarRegistroOReinscripcion(identificador) {
  localStorage.removeItem("alumnoFolio");
  localStorage.removeItem("numeroControlReinscripcion");
  localStorage.removeItem("datosPrecargados");

  const buscarFolio = async () => {
    const res = await fetch(`/api/folio/${encodeURIComponent(identificador)}`);
    if (!res.ok) return false;

    const data = await res.json();
    localStorage.setItem("alumnoFolio", identificador);
    localStorage.setItem("datosPrecargados", JSON.stringify(data));
    window.location.href = `/formulario-registro.html?folio=${encodeURIComponent(identificador)}`;
    return true;
  };

  const buscarReinscripcion = async () => {
    const res = await fetch(`/api/reinscripcion/${encodeURIComponent(identificador)}`);
    if (!res.ok) return false;

    const data = await res.json();
    localStorage.setItem("numeroControlReinscripcion", identificador);
    localStorage.setItem("datosPrecargados", JSON.stringify(data.alumno || {}));
    window.location.href = `/formulario-reinscripcion.html?numero_control=${encodeURIComponent(identificador)}`;
    return true;
  };

  const pareceNumeroControl = /^\d+$/.test(identificador);
  const encontrado = pareceNumeroControl
    ? await buscarReinscripcion()
    : (await buscarFolio()) || (await buscarReinscripcion());

  if (!encontrado) {
    const mensaje = pareceNumeroControl
      ? "No se encontró el número de control en registrados"
      : "No se encontró el folio en alumnos ni el número de control en registrados";
    alert(mensaje);
  }
}

busquedaRegistroForm.addEventListener("submit", (e) => {
  e.preventDefault();

  const identificador = identificadorBusqueda.value.trim().toUpperCase();
  if (!identificador) {
    alert("Ingresa un folio o número de control válido");
    return;
  }

  buscarRegistroOReinscripcion(identificador).catch((err) => {
    console.error(err);
    alert("Error al consultar la información");
  });
});
</script>
